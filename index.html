<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PBT LMS — เข้าสู่ระบบ</title>
  <meta name="description" content="ระบบติวเตอร์ส่วนตัว PBTstudents — Login เพื่อเข้าใช้งาน">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="bg-animated"></div>

  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon">📚</div>
        <h1>PBT LMS</h1>
        <p>ระบบติวเตอร์ส่วนตัว — Private Tutoring System</p>
      </div>

      <div class="login-error" id="loginError"></div>

      <form id="loginForm" onsubmit="handleLoginSubmit(event)">
        <div class="form-group">
          <label class="form-label" for="username">ชื่อผู้ใช้</label>
          <input class="form-input" type="text" id="username" placeholder="กรอก username" autocomplete="username" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">รหัสผ่าน</label>
          <input class="form-input" type="password" id="password" placeholder="กรอกรหัสผ่าน" autocomplete="current-password" required>
        </div>

        <button type="submit" class="btn btn-primary btn-lg btn-block" id="loginBtn">
          เข้าสู่ระบบ
        </button>
      </form>

      <div style="text-align:center; margin-top:var(--space-xl); color:var(--text-muted); font-size:0.8rem;">
        © 2026 PBTstudents — Private Tutoring Platform
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Auto-redirect if already logged in
    if (isLoggedIn()) {
      window.location.href = 'dashboard.html';
    }

    async function handleLoginSubmit(e) {
      e.preventDefault();

      var errorEl = document.getElementById('loginError');
      var btn = document.getElementById('loginBtn');
      var usernameVal = document.getElementById('username').value.trim();
      var passwordVal = document.getElementById('password').value.trim();

      errorEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'กำลังเข้าสู่ระบบ...';

      try {
        var user = await login(usernameVal, passwordVal);
        window.location.href = 'dashboard.html';
      } catch (err) {
        errorEl.textContent = err.message || 'เข้าสู่ระบบไม่สำเร็จ กรุณาลองอีกครั้ง';
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'เข้าสู่ระบบ';
      }
    }
  </script>
</body>
</html>
