<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PBT LMS — จัดการระบบ (Admin)</title>
  <meta name="description" content="Admin Panel — จัดการวิชา บทเรียน ข้อสอบ ตรวจงาน ดูคะแนน">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .admin-stat{display:flex;flex-direction:column;align-items:center;padding:var(--space-lg);text-align:center}
    .admin-stat .stat-num{font-size:2rem;font-weight:800;line-height:1}
    .admin-stat .stat-lbl{font-size:.8rem;color:var(--text-secondary);margin-top:4px}
    .modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal-box{width:92%;max-width:500px;max-height:90vh;overflow-y:auto}
    .q-type-toggle{display:flex;gap:var(--space-sm);margin-bottom:var(--space-md)}
    .q-type-toggle button{padding:6px 14px;border-radius:8px;border:1px solid var(--border-color);background:transparent;color:var(--text-secondary);cursor:pointer;font-size:.85rem}
    .q-type-toggle button.active{background:var(--primary);color:#fff;border-color:var(--primary)}
    .submission-card{border-left:3px solid var(--primary);margin-bottom:var(--space-lg)}
    .grade-input{width:70px;text-align:center}
    .status-pending{color:#f59e0b}.status-graded{color:#10b981}.status-auto{color:#06b6d4}
    .pass-badge{padding:2px 10px;border-radius:99px;font-size:.75rem;font-weight:700}
    .pass-yes{background:#10b98120;color:#10b981}.pass-no{background:#ef444420;color:#ef4444}
    .pass-wait{background:#f59e0b20;color:#f59e0b}
  </style>
</head>
<body>
  <div class="bg-animated"></div>
  <div class="app-container">
    <div class="page-header">
      <h1 class="page-title">⚙️ Admin Panel</h1>
      <p class="page-subtitle">จัดการระบบ LMS ทั้งหมดจากที่เดียว</p>
    </div>

    <div class="tabs" style="flex-wrap:wrap">
      <button class="tab-btn active" data-tab="tabDash">📊 Dashboard</button>
      <button class="tab-btn" data-tab="tabStudents">👥 นักเรียน</button>
      <button class="tab-btn" data-tab="tabSubjects">📚 วิชา</button>
      <button class="tab-btn" data-tab="tabLessons">📖 บทเรียน</button>
      <button class="tab-btn" data-tab="tabAssess">📝 ข้อสอบ</button>
      <button class="tab-btn" data-tab="tabGrading">✅ ตรวจข้อสอบ</button>
      <button class="tab-btn" data-tab="tabScores">📊 คะแนน</button>
    </div>

    <!-- ═══ TAB: Dashboard ═══ -->
    <div class="tab-content active" id="tabDash">
      <div class="grid-4 stagger" id="adminStatsGrid" style="margin-bottom:var(--space-xl)"></div>
      <h3 style="margin-bottom:var(--space-md)">👥 สรุปนักเรียน</h3>
      <div id="adminStudentSummary"><div class="empty-state"><div class="spinner" style="margin:0 auto"></div></div></div>
      <h3 style="margin:var(--space-xl) 0 var(--space-md)">🕐 กิจกรรมล่าสุด</h3>
      <div id="adminRecentActivity"><div class="empty-state"><div class="spinner" style="margin:0 auto"></div></div></div>
    </div>

    <!-- ═══ TAB: Students ═══ -->
    <div class="tab-content" id="tabStudents">
      <div class="card" style="margin-bottom:var(--space-xl)">
        <h3 style="font-size:1.1rem;font-weight:600;margin-bottom:var(--space-lg)">➕ เพิ่มนักเรียนใหม่</h3>
        <form onsubmit="addUser(event)">
          <div class="grid-2">
            <div class="form-group"><label class="form-label">Username *</label><input class="form-input" id="uUsername" required placeholder="username"></div>
            <div class="form-group"><label class="form-label">รหัสผ่าน *</label><input class="form-input" id="uPassword" required placeholder="ขั้นต่ำ 4 ตัว" minlength="4"></div>
          </div>
          <div class="grid-2">
            <div class="form-group"><label class="form-label">ชื่อจริง *</label><input class="form-input" id="uFirstName" required placeholder="สมชาย"></div>
            <div class="form-group"><label class="form-label">นามสกุล *</label><input class="form-input" id="uLastName" required placeholder="ใจดี"></div>
          </div>
          <div class="grid-2">
            <div class="form-group"><label class="form-label">ชื่อเล่น</label><input class="form-input" id="uNickname" placeholder="ชาย"></div>
            <div class="form-group"><label class="form-label">วันเกิด</label><input class="form-input" id="uDob" type="date"></div>
          </div>
          <div class="grid-2">
            <div class="form-group"><label class="form-label">เลขบัตรประชาชน (13 หลัก)</label><input class="form-input" id="uCitizen" maxlength="13" pattern="\\d{13}"></div>
            <div class="form-group"><label class="form-label">สี Avatar</label><input class="form-input" id="uColor" type="color" value="#10b981"></div>
          </div>
          <button type="submit" class="btn btn-primary">➕ เพิ่มนักเรียน</button>
        </form>
      </div>
      <div id="usersListContainer"></div>
    </div>

    <!-- ═══ TAB: Subjects ═══ -->
    <div class="tab-content" id="tabSubjects">
      <div class="card" style="margin-bottom:var(--space-xl)">
        <h3 style="font-size:1.1rem;font-weight:600;margin-bottom:var(--space-lg)">เพิ่มวิชาใหม่</h3>
        <form onsubmit="addSubject(event)">
          <div class="grid-2">
            <div class="form-group"><label class="form-label">ชื่อวิชา *</label><input class="form-input" id="subName" required placeholder="เช่น ฟิสิกส์ ม.4"></div>
            <div class="form-group"><label class="form-label">ไอคอน</label><input class="form-input" id="subIcon" placeholder="emoji" value="📚"></div>
          </div>
          <div class="form-group"><label class="form-label">คำอธิบาย</label><input class="form-input" id="subDesc" placeholder="คำอธิบายสั้นๆ"></div>
          <div class="grid-2">
            <div class="form-group"><label class="form-label">สี</label><input class="form-input" id="subColor" value="#3b82f6" type="color"></div>
            <div class="form-group"><label class="form-label">เกณฑ์ผ่านวิชานี้ (%)</label><input class="form-input" id="subPass" type="number" value="50" min="0" max="100"></div>
          </div>
          <div class="form-group"><label class="form-label">ลำดับ</label><input class="form-input" id="subOrder" type="number" value="0"></div>
          <button type="submit" class="btn btn-primary">➕ เพิ่มวิชา</button>
        </form>
      </div>
      <div id="subjectsList"></div>
    </div>

    <!-- ═══ TAB: Lessons ═══ -->
    <div class="tab-content" id="tabLessons">
      <div class="card" style="margin-bottom:var(--space-xl)">
        <h3 style="font-size:1.1rem;font-weight:600;margin-bottom:var(--space-lg)">เพิ่มบทเรียนใหม่</h3>
        <form onsubmit="addLesson(event)">
          <div class="grid-2">
            <div class="form-group"><label class="form-label">วิชา *</label><select class="form-select" id="lessonSubject" required></select></div>
            <div class="form-group"><label class="form-label">บท/Chapter</label><input class="form-input" id="lessonChapter" placeholder="บทที่ 1"></div>
          </div>
          <div class="form-group"><label class="form-label">ชื่อบทเรียน *</label><input class="form-input" id="lessonTitle" required></div>
          <div class="form-group"><label class="form-label">คำอธิบาย</label><textarea class="form-textarea" id="lessonDesc"></textarea></div>
          <div class="grid-2">
            <div class="form-group"><label class="form-label">URL ไฟล์</label><input class="form-input" id="lessonFile" placeholder="https://drive.google.com/..."></div>
            <div class="form-group"><label class="form-label">ประเภทไฟล์</label>
              <select class="form-select" id="lessonFileType"><option value="pdf">📄 PDF</option><option value="video">🎬 Video</option><option value="link">🔗 Link</option><option value="doc">📝 Doc</option><option value="ppt">📊 PPT</option><option value="image">🖼️ Image</option></select>
            </div>
          </div>
          <div class="form-group"><label class="form-label">ลำดับ</label><input class="form-input" id="lessonOrder" type="number" value="0"></div>
          <button type="submit" class="btn btn-primary">➕ เพิ่มบทเรียน</button>
        </form>
      </div>
    </div>

    <!-- ═══ TAB: Assessments ═══ -->
    <div class="tab-content" id="tabAssess">
      <div class="card" style="margin-bottom:var(--space-xl)">
        <h3 style="font-size:1.1rem;font-weight:600;margin-bottom:var(--space-lg)">📝 สร้างข้อสอบ / แบบทดสอบ</h3>
        <form onsubmit="addAssignment(event)">
          <div class="grid-2">
            <div class="form-group"><label class="form-label">วิชา *</label><select class="form-select" id="assignSubject" required></select></div>
            <div class="form-group"><label class="form-label">ประเภท</label>
              <select class="form-select" id="assignType"><option value="quiz">📝 Quiz</option><option value="essay">✍️ ข้อเขียน</option><option value="mixed">📋 ผสม</option></select>
            </div>
          </div>
          <div class="form-group"><label class="form-label">ชื่อข้อสอบ *</label><input class="form-input" id="assignTitle" required></div>
          <div class="form-group"><label class="form-label">คำอธิบาย</label><input class="form-input" id="assignDesc"></div>
          <div class="grid-2">
            <div class="form-group"><label class="form-label">เกณฑ์ผ่าน (%)</label><input class="form-input" id="assignPass" type="number" value="50" min="0" max="100"></div>
            <div class="form-group"><label class="form-label">กำหนดส่ง</label><input class="form-input" id="assignDue" type="date"></div>
          </div>
          <button type="submit" class="btn btn-primary">➕ สร้างข้อสอบ</button>
        </form>
      </div>
      <hr style="border-color:var(--border-color);margin:var(--space-xl) 0">
      <div class="card" style="margin-bottom:var(--space-xl)">
        <h3 style="font-size:1.1rem;font-weight:600;margin-bottom:var(--space-lg)">❓ เพิ่มคำถาม</h3>
        <form onsubmit="addQuestion(event)" id="questionForm">
          <div class="grid-2">
            <div class="form-group"><label class="form-label">ข้อสอบ *</label><select class="form-select" id="qAssignment" required></select></div>
            <div class="form-group"><label class="form-label">คะแนนข้อนี้</label><input class="form-input" id="qPoints" type="number" value="1" min="0" step="0.5"></div>
          </div>
          <div class="form-group"><label class="form-label">ประเภทคำถาม</label>
            <div class="q-type-toggle" id="qTypeToggle">
              <button type="button" class="active" onclick="setQType('mcq')">📝 ปรนัย (MCQ)</button>
              <button type="button" onclick="setQType('essay')">✍️ อัตนัย</button>
              <button type="button" onclick="setQType('upload')">📤 อัพโหลด</button>
            </div>
          </div>
          <input type="hidden" id="qType" value="mcq">
          <div class="form-group"><label class="form-label">คำถาม *</label><textarea class="form-textarea" id="qText" required></textarea></div>
          <div class="form-group"><label class="form-label">URL รูปประกอบ (ถ้ามี)</label><input class="form-input" id="qImage" placeholder="https://..."></div>
          <div id="mcqChoicesArea">
            <div class="grid-2">
              <div class="form-group"><label class="form-label">A *</label><input class="form-input" id="qA" placeholder="ตัวเลือก A"></div>
              <div class="form-group"><label class="form-label">B *</label><input class="form-input" id="qB" placeholder="ตัวเลือก B"></div>
            </div>
            <div class="grid-2">
              <div class="form-group"><label class="form-label">C</label><input class="form-input" id="qC" placeholder="ตัวเลือก C"></div>
              <div class="form-group"><label class="form-label">D</label><input class="form-input" id="qD" placeholder="ตัวเลือก D"></div>
            </div>
            <div class="form-group"><label class="form-label">เฉลย *</label>
              <select class="form-select" id="qCorrect"><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option></select>
            </div>
          </div>
          <button type="submit" class="btn btn-primary">➕ เพิ่มคำถาม</button>
        </form>
      </div>
    </div>

    <!-- ═══ TAB: Grading ═══ -->
    <div class="tab-content" id="tabGrading">
      <div style="display:flex;gap:var(--space-md);margin-bottom:var(--space-lg);flex-wrap:wrap;align-items:center">
        <select class="form-select" id="gradingFilter" onchange="loadSubmissions()" style="width:auto">
          <option value="pending">🟡 รอตรวจ</option>
          <option value="graded">✅ ตรวจแล้ว</option>
          <option value="auto_graded">🤖 ตรวจอัตโนมัติ</option>
          <option value="all">📋 ทั้งหมด</option>
        </select>
        <button class="btn" onclick="loadSubmissions()" style="background:var(--glass-bg);color:var(--text-primary)">🔄 รีเฟรช</button>
      </div>
      <div id="submissionsContainer"><div class="empty-state"><div class="spinner" style="margin:0 auto"></div></div></div>
    </div>

    <!-- ═══ TAB: Scores ═══ -->
    <div class="tab-content" id="tabScores">
      <div id="allScoresContainer"><div class="empty-state"><div class="spinner" style="margin:0 auto"></div></div></div>
    </div>

    <!-- ═══ Modals ═══ -->
    <div class="modal-overlay" id="passwordModal">
      <div class="card modal-box">
        <h3 style="font-size:1.1rem;font-weight:600;margin-bottom:var(--space-lg)">🔑 เปลี่ยนรหัสผ่าน</h3>
        <p style="margin-bottom:var(--space-md);color:var(--text-secondary)">ผู้ใช้: <strong id="modalUserName"></strong></p>
        <div class="form-group"><label class="form-label">รหัสผ่านใหม่ (≥4 ตัว)</label><input class="form-input" id="newPasswordInput" type="text" minlength="4"></div>
        <div style="display:flex;gap:var(--space-sm);justify-content:flex-end">
          <button class="btn" style="background:var(--glass-bg);color:var(--text-primary)" onclick="closeModal('passwordModal')">ยกเลิก</button>
          <button class="btn btn-primary" id="btnSavePassword" onclick="saveNewPassword()">💾 บันทึก</button>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="studentDetailModal">
      <div class="card modal-box" style="max-width:650px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-lg)">
          <h3 style="font-size:1.1rem;font-weight:600" id="detailStudentName">📋 รายละเอียดนักเรียน</h3>
          <button class="btn btn-sm" onclick="closeModal('studentDetailModal')" style="background:var(--glass-bg);color:var(--text-primary)">✕</button>
        </div>
        <div id="studentDetailContent"></div>
      </div>
    </div>

    <div class="modal-overlay" id="gradingModal">
      <div class="card modal-box" style="max-width:700px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-lg)">
          <h3 style="font-size:1.1rem;font-weight:600" id="gradingModalTitle">✅ ตรวจข้อสอบ</h3>
          <button class="btn btn-sm" onclick="closeModal('gradingModal')" style="background:var(--glass-bg);color:var(--text-primary)">✕</button>
        </div>
        <div id="gradingModalContent"></div>
      </div>
    </div>

    <div class="modal-overlay" id="adjustScoreModal">
      <div class="card modal-box" style="max-width:400px">
        <h3 style="font-size:1.1rem;font-weight:600;margin-bottom:var(--space-md)">✏️ ปรับแก้คะแนนย้อนหลัง</h3>
        <p style="margin-bottom:var(--space-md);color:var(--text-secondary);font-size:0.85rem">ผู้ใช้: <strong id="adjUserName"></strong><br>งาน: <strong id="adjTaskName"></strong></p>
        <div class="grid-2">
          <div class="form-group">
            <label class="form-label">คะแนนใหม่</label>
            <input class="form-input" id="adjNewScore" type="number" step="0.5" required>
          </div>
          <div class="form-group">
            <label class="form-label">บังคับผ่าน/ไม่ผ่าน</label>
            <select class="form-select" id="adjPassedOverride">
              <option value="">(ตามเกณฑ์อัตโนมัติ)</option>
              <option value="true">✅ ผ่าน</option>
              <option value="false">❌ ไม่ผ่าน</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">เหตุผลการแก้คะแนน *</label>
          <input class="form-input" id="adjReason" placeholder="เช่น ส่งงานเพิ่มเติม, ระบบคิดคะแนนผิด" required>
        </div>
        <div style="display:flex;gap:var(--space-sm);justify-content:flex-end">
          <button class="btn" style="background:var(--glass-bg);color:var(--text-primary)" onclick="closeModal('adjustScoreModal')">ยกเลิก</button>
          <button class="btn btn-primary" onclick="submitScoreAdjustment()" id="btnSaveAdjustment">💾 บันทึก</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
